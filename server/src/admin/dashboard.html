<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Living Olive — Admin Command Center</title>
<style>
/* ── Reset & Base ───────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030308;--bg1:#07070f;--bg2:#0d0d1e;
  --cyan:#00d4ff;--purple:#9d4eff;--green:#00ff9d;--amber:#ffb800;--red:#ff3d5a;
  --cyan-dim:rgba(0,212,255,0.12);--purple-dim:rgba(157,78,255,0.12);
  --border:rgba(0,212,255,0.15);--border2:rgba(157,78,255,0.15);
  --text:#c8d4e8;--text-dim:rgba(200,212,232,0.45);
  --font:'Courier New',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Layout ─────────────────────────────────────────────────────── */
#app{position:relative;z-index:1;height:100vh;display:grid;grid-template-rows:56px 1fr;grid-template-columns:1fr}
#main{display:grid;grid-template-columns:260px 1fr 320px;overflow:hidden;height:100%}

/* ── Top Bar ─────────────────────────────────────────────────────── */
#topbar{grid-column:1/-1;background:rgba(3,3,8,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;backdrop-filter:blur(20px)}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-right:auto}
.logo-wrap span:first-child{font-size:22px}
.logo-title{font-size:13px;letter-spacing:4px;color:var(--cyan);text-transform:uppercase}
.logo-sub{font-size:9px;letter-spacing:2px;color:rgba(0,212,255,0.4);display:block;margin-top:1px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse2 2s infinite}
.topbar-stat{font-size:10px;letter-spacing:1px;color:var(--text-dim)}
.topbar-stat strong{color:var(--cyan);margin-left:4px}
#clock{font-size:11px;letter-spacing:2px;color:var(--text-dim);margin-left:auto}
#logout-btn{background:none;border:1px solid rgba(255,61,90,0.3);border-radius:6px;padding:6px 14px;color:rgba(255,61,90,0.7);font-family:var(--font);font-size:10px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s}
#logout-btn:hover{border-color:var(--red);color:var(--red);box-shadow:0 0 12px rgba(255,61,90,0.2)}

/* ── Left Panel ─────────────────────────────────────────────────── */
#left-panel{border-right:1px solid var(--border);overflow-y:auto;background:rgba(7,7,15,0.6);padding:16px}
#left-panel::-webkit-scrollbar{width:3px}
#left-panel::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2)}

/* Agents */
.section-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);padding:8px 4px 6px;border-bottom:1px solid rgba(255,255,255,0.04);margin-bottom:8px}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.agent-card::before{content:'';position:absolute;inset:0;background:var(--cyan-dim);opacity:0;transition:opacity .2s}
.agent-card:hover::before{opacity:1}
.agent-card.running{border-color:rgba(0,212,255,0.4);animation:cardPulse 1.5s ease-in-out infinite}
.agent-card.done{border-color:rgba(0,255,157,0.25)}
.agent-card.error{border-color:rgba(255,61,90,0.4)}
.agent-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.agent-icon{font-size:16px}
.agent-name{font-size:11px;letter-spacing:1px;flex:1}
.agent-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);flex-shrink:0}
.agent-dot.running{background:var(--cyan);box-shadow:0 0 8px var(--cyan);animation:pulse2 1s infinite}
.agent-dot.done{background:var(--green);box-shadow:0 0 6px var(--green)}
.agent-dot.error{background:var(--red);box-shadow:0 0 8px var(--red)}
.agent-detail{font-size:9px;color:var(--text-dim);line-height:1.4;min-height:14px;letter-spacing:.3px}
.agent-meta{display:flex;gap:8px;margin-top:6px}
.agent-badge{font-size:8px;letter-spacing:1px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,0.04);color:var(--text-dim)}
.agent-badge.running{background:rgba(0,212,255,0.1);color:var(--cyan)}
.agent-badge.done{background:rgba(0,255,157,0.08);color:var(--green)}
.agent-badge.error{background:rgba(255,61,90,0.1);color:var(--red)}

/* ── Center Panel ────────────────────────────────────────────────── */
#center-panel{display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}

/* Stats row */
#stats-row{padding:14px 16px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;border-bottom:1px solid var(--border)}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--purple))}
.stat-val{font-size:22px;font-weight:700;color:var(--cyan);display:block;line-height:1;font-family:'Courier New',monospace}
.stat-label{font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-top:4px;display:block}

/* Event log */
#log-panel{overflow:hidden;display:flex;flex-direction:column;position:relative}
#log-header{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;gap:8px}
#log-header h2{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;flex:1}
#log-clear{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:5px;padding:4px 10px;color:var(--text-dim);font-family:var(--font);font-size:9px;letter-spacing:1px;cursor:pointer}
#log-clear:hover{border-color:var(--border);color:var(--cyan)}
#log-body{flex:1;overflow-y:auto;padding:8px 16px;font-size:11px;line-height:1.7}
#log-body::-webkit-scrollbar{width:3px}
#log-body::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15)}
.log-line{display:flex;gap:10px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02);animation:fadeIn .3s ease}
.log-time{color:rgba(0,212,255,0.35);flex-shrink:0;font-size:10px}
.log-agent{flex-shrink:0;font-size:10px;width:100px}
.log-agent.webCrawler{color:#00d4ff}
.log-agent.geneticAlgorithm{color:#9d4eff}
.log-agent.keywordLearner{color:#00ff9d}
.log-agent.autoDiscovery{color:#ffb800}
.log-agent.qualityBenchmark{color:#ff9d00}
.log-agent.qualitySync{color:#ff6eb4}
.log-agent.bibleIndex{color:#64d8ff}
.log-agent.markovModel{color:#c084fc}
.log-agent.scheduler{color:#94a3b8}
.log-agent.admin{color:#f87171}
.log-agent.api{color:#4ade80}
.log-msg{color:var(--text);flex:1;word-break:break-word}

/* ── Users bar ─────────────────────────────────────────────────── */
#users-bar{border-top:1px solid var(--border);padding:12px 16px}
#users-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#users-header h2{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;flex:1}
#user-search{background:rgba(0,212,255,0.04);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-family:var(--font);font-size:10px;width:160px;outline:none}
#users-table-wrap{max-height:200px;overflow-y:auto}
#users-table-wrap::-webkit-scrollbar{width:3px}
#users-table-wrap::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15)}
table{width:100%;border-collapse:collapse;font-size:10px}
th{text-align:left;color:var(--text-dim);letter-spacing:2px;font-size:8px;text-transform:uppercase;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.05)}
td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text)}
td.email{color:var(--cyan)}
.user-badge{font-size:8px;padding:2px 6px;border-radius:10px;background:rgba(0,255,157,0.1);color:var(--green)}

/* ── Right Panel ────────────────────────────────────────────────── */
#right-panel{border-left:1px solid var(--border);overflow-y:auto;padding:16px;background:rgba(7,7,15,0.6)}
#right-panel::-webkit-scrollbar{width:3px}
#right-panel::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.15)}
.flag-group{margin-bottom:20px}
.flag-group-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--purple);padding:6px 4px;border-bottom:1px solid var(--border2);margin-bottom:10px}
.flag-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--bg2);border:1px solid rgba(255,255,255,0.04);margin-bottom:6px;transition:all .2s}
.flag-row:hover{border-color:var(--border)}
.flag-label{flex:1;font-size:10px;letter-spacing:.5px}
/* Toggle switch */
.toggle{position:relative;width:38px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:rgba(255,255,255,0.08);border-radius:20px;cursor:pointer;transition:all .25s;border:1px solid rgba(255,255,255,0.1)}
.slider::before{content:'';position:absolute;height:14px;width:14px;left:2px;bottom:2px;background:var(--text-dim);border-radius:50%;transition:all .25s}
.toggle input:checked+.slider{background:rgba(0,212,255,0.2);border-color:var(--cyan);box-shadow:0 0 12px rgba(0,212,255,0.2)}
.toggle input:checked+.slider::before{transform:translateX(18px);background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

/* ── Radar / Activity chart ─────────────────────────────────────── */
#radar-wrap{margin-bottom:16px}
#radar-wrap h3{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
#radar-canvas{display:block;margin:0 auto}

/* ── Animations ─────────────────────────────────────────────────── */
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes cardPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,0)}50%{box-shadow:0 0 0 3px rgba(0,212,255,0.12)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes scanline{0%{top:-2px}100%{top:100vh}}
.scan-line{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.3),transparent);animation:scanline 6s linear infinite;z-index:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="scan-line"></div>

<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <div class="logo-wrap">
      <span>🫒</span>
      <div>
        <span class="logo-title">Living Olive</span>
        <span class="logo-sub">Admin Command Center</span>
      </div>
    </div>
    <div class="status-dot" id="conn-dot" title="Event stream"></div>
    <div class="topbar-stat">Users<strong id="tb-users">—</strong></div>
    <div class="topbar-stat">Prayer Plans<strong id="tb-prayer">—</strong></div>
    <div class="topbar-stat">Devotion Plans<strong id="tb-devotion">—</strong></div>
    <div class="topbar-stat">Feedback<strong id="tb-feedback">—</strong></div>
    <div class="topbar-stat">Keywords<strong id="tb-keywords">—</strong></div>
    <span id="clock"></span>
    <form method="POST" action="/admin/logout" style="margin:0">
      <button id="logout-btn" type="submit">LOGOUT</button>
    </form>
  </div>

  <div id="main">
    <!-- Left: Agents -->
    <div id="left-panel">
      <div class="section-label">⚡ Live Agent Status</div>
      <div id="agents-list"></div>
    </div>

    <!-- Center: Stats + Log + Users -->
    <div id="center-panel">
      <div id="stats-row">
        <div class="stat-card"><span class="stat-val" id="st-users">—</span><span class="stat-label">Total Users</span></div>
        <div class="stat-card"><span class="stat-val" id="st-prayer">—</span><span class="stat-label">Prayer Plans</span></div>
        <div class="stat-card"><span class="stat-val" id="st-devotion">—</span><span class="stat-label">Devotion Plans</span></div>
        <div class="stat-card"><span class="stat-val" id="st-feedback">—</span><span class="stat-label">Feedback Items</span></div>
        <div class="stat-card"><span class="stat-val" id="st-keywords">—</span><span class="stat-label">Learned Keywords</span></div>
      </div>

      <div id="log-panel">
        <div id="log-header">
          <h2>🔴 Live Event Stream</h2>
          <button id="log-clear">CLEAR</button>
        </div>
        <div id="log-body"></div>
      </div>

      <div id="users-bar">
        <div id="users-header">
          <h2>👤 Users</h2>
          <input id="user-search" placeholder="Filter by email…" type="text">
        </div>
        <div id="users-table-wrap">
          <table>
            <thead><tr>
              <th>Email</th>
              <th>ID</th>
              <th>Created</th>
              <th>Status</th>
            </tr></thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Right: Flags + Radar -->
    <div id="right-panel">
      <div id="radar-wrap">
        <h3>⬡ Agent Activity Matrix</h3>
        <canvas id="radar-canvas" width="260" height="180"></canvas>
      </div>
      <div class="section-label" style="margin-bottom:14px">⚙ Feature Flags</div>
      <div id="flags-list"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// BACKGROUND CANVAS — neural grid
// ═══════════════════════════════════════════════════════
(function(){
  const c=document.getElementById('bg'),ctx=c.getContext('2d');
  let W,H,nodes=[],t=0;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;nodes=[];
    for(let i=0;i<70;i++)nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.2+.3});}
  function draw(){
    ctx.clearRect(0,0,W,H);t+=.003;
    // subtle grid
    ctx.strokeStyle='rgba(0,212,255,0.02)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // nodes
    nodes.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
      const a=Math.abs(Math.sin(t+p.x*.01))*.5+.1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,212,255,${a})`;ctx.fill();});
    // connections
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
      if(d<130){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle=`rgba(0,212,255,${(1-d/130)*.04})`;ctx.lineWidth=.5;ctx.stroke();}}
    requestAnimationFrame(draw);}
  window.addEventListener('resize',resize);resize();draw();
})();

// ═══════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════
const clockEl=document.getElementById('clock');
function tick(){const n=new Date();clockEl.textContent=n.toUTCString().slice(17,25)+' UTC';}
tick();setInterval(tick,1000);

// ═══════════════════════════════════════════════════════
// AGENT DEFINITIONS (local metadata)
// ═══════════════════════════════════════════════════════
const AGENT_META={
  webCrawler:       {icon:'🕷️', name:'Web Crawler',         color:'#00d4ff'},
  geneticAlgorithm: {icon:'🧬', name:'Genetic Optimizer',    color:'#9d4eff'},
  keywordLearner:   {icon:'🧠', name:'Keyword Learner',      color:'#00ff9d'},
  autoDiscovery:    {icon:'🔭', name:'Auto-Discovery',       color:'#ffb800'},
  qualityBenchmark: {icon:'📊', name:'Quality Benchmark',    color:'#ff9d00'},
  qualitySync:      {icon:'⚖️',  name:'Quality Sync',         color:'#ff6eb4'},
  bibleIndex:       {icon:'📖', name:'Bible TF-IDF Index',   color:'#64d8ff'},
  markovModel:      {icon:'🔮', name:'Markov Language Model',color:'#c084fc'},
  scheduler:        {icon:'⏰', name:'Scheduler',            color:'#94a3b8'},
  admin:            {icon:'🛡️', name:'Admin',                color:'#f87171'},
  api:              {icon:'🔌', name:'API Server',           color:'#4ade80'},
  weightSync:       {icon:'⚡', name:'Weight Sync',          color:'#38bdf8'},
};
const AGENT_ORDER=['webCrawler','geneticAlgorithm','keywordLearner','autoDiscovery','qualityBenchmark','qualitySync','bibleIndex','markovModel','weightSync','scheduler','api','admin'];

let agentState={};   // live state per agent
let allUsers=[];     // loaded once

// ═══════════════════════════════════════════════════════
// RENDER AGENTS
// ═══════════════════════════════════════════════════════
function renderAgents(){
  const list=document.getElementById('agents-list');
  list.innerHTML='';
  for(const key of AGENT_ORDER){
    const s=agentState[key]||{status:'idle',detail:'',lastRun:null};
    const m=AGENT_META[key]||{icon:'⚙',name:key,color:'#94a3b8'};
    const st=s.status||'idle';
    const lastRunStr=s.lastRun?new Date(s.lastRun).toLocaleTimeString():'Never';
    const div=document.createElement('div');
    div.className=`agent-card ${st}`;
    div.innerHTML=`
      <div class="agent-header">
        <span class="agent-icon">${m.icon}</span>
        <span class="agent-name" style="color:${m.color}">${m.name}</span>
        <span class="agent-dot ${st}"></span>
      </div>
      <div class="agent-detail">${s.detail||'Idle'}</div>
      <div class="agent-meta">
        <span class="agent-badge ${st}">${st.toUpperCase()}</span>
        <span class="agent-badge">Last: ${lastRunStr}</span>
        ${s.duration?`<span class="agent-badge">${s.duration}s</span>`:''}
      </div>`;
    list.appendChild(div);
  }
}

// ═══════════════════════════════════════════════════════
// RADAR / ACTIVITY MATRIX
// ═══════════════════════════════════════════════════════
const radarCanvas=document.getElementById('radar-canvas');
const rCtx=radarCanvas.getContext('2d');
let radarT=0;
const RADAR_AGENTS=['webCrawler','geneticAlgorithm','keywordLearner','autoDiscovery','qualityBenchmark','bibleIndex','markovModel','weightSync'];

function drawRadar(){
  const W=radarCanvas.width,H=radarCanvas.height;
  rCtx.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,N=RADAR_AGENTS.length,r=70;
  radarT+=0.02;

  // rings
  [.33,.66,1].forEach((f,i)=>{
    rCtx.beginPath();rCtx.arc(cx,cy,r*f,0,Math.PI*2);
    rCtx.strokeStyle=`rgba(0,212,255,${0.06+i*0.03})`;rCtx.lineWidth=1;rCtx.stroke();});

  // spokes
  for(let i=0;i<N;i++){
    const a=i/N*Math.PI*2-Math.PI/2;
    rCtx.beginPath();rCtx.moveTo(cx,cy);rCtx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    rCtx.strokeStyle='rgba(0,212,255,0.08)';rCtx.lineWidth=1;rCtx.stroke();}

  // data polygon
  const vals=RADAR_AGENTS.map(k=>{
    const s=agentState[k];
    if(!s||s.status==='idle')return 0.1+Math.sin(radarT)*0.05;
    if(s.status==='running')return 0.7+Math.sin(radarT*3)*0.2;
    if(s.status==='done')return 0.5+Math.sin(radarT)*0.1;
    return 0.15;
  });

  rCtx.beginPath();
  vals.forEach((v,i)=>{
    const a=i/N*Math.PI*2-Math.PI/2;
    const x=cx+Math.cos(a)*r*v, y=cy+Math.sin(a)*r*v;
    i===0?rCtx.moveTo(x,y):rCtx.lineTo(x,y);});
  rCtx.closePath();
  rCtx.fillStyle='rgba(0,212,255,0.07)';rCtx.fill();
  rCtx.strokeStyle='rgba(0,212,255,0.5)';rCtx.lineWidth=1.5;rCtx.stroke();

  // dots per agent
  vals.forEach((v,i)=>{
    const a=i/N*Math.PI*2-Math.PI/2;
    const x=cx+Math.cos(a)*r*v, y=cy+Math.sin(a)*r*v;
    const s=agentState[RADAR_AGENTS[i]];
    const col=s?.status==='running'?'#00d4ff':s?.status==='done'?'#00ff9d':'rgba(0,212,255,0.3)';
    rCtx.beginPath();rCtx.arc(x,y,3,0,Math.PI*2);
    rCtx.fillStyle=col;rCtx.fill();
    if(s?.status==='running'){rCtx.beginPath();rCtx.arc(x,y,6+Math.sin(radarT*4)*2,0,Math.PI*2);
      rCtx.strokeStyle='rgba(0,212,255,0.3)';rCtx.lineWidth=1;rCtx.stroke();}

    // label
    const lx=cx+Math.cos(a)*(r+18), ly=cy+Math.sin(a)*(r+18);
    rCtx.fillStyle='rgba(200,212,232,0.5)';rCtx.font='7px Courier New';rCtx.textAlign='center';rCtx.textBaseline='middle';
    rCtx.fillText(AGENT_META[RADAR_AGENTS[i]]?.icon||'⚙',lx,ly);
  });

  requestAnimationFrame(drawRadar);
}
drawRadar();

// ═══════════════════════════════════════════════════════
// EVENT LOG
// ═══════════════════════════════════════════════════════
const logBody=document.getElementById('log-body');
let logCount=0;
function appendLog(ts,agent,msg,color){
  logCount++;
  if(logCount>500){const lines=logBody.querySelectorAll('.log-line');if(lines[0])lines[0].remove();}
  const t=new Date(ts).toLocaleTimeString();
  const div=document.createElement('div');div.className='log-line';
  const m=AGENT_META[agent]||{};
  div.innerHTML=`<span class="log-time">${t}</span><span class="log-agent ${agent}" style="color:${color||m.color||'#94a3b8'}">${m.icon||'⚙'} ${agent}</span><span class="log-msg">${msg}</span>`;
  logBody.appendChild(div);
  logBody.scrollTop=logBody.scrollHeight;
}
document.getElementById('log-clear').onclick=()=>{logBody.innerHTML='';logCount=0;};

// ═══════════════════════════════════════════════════════
// FEATURE FLAGS
// ═══════════════════════════════════════════════════════
let flagsData={};
function renderFlags(flags){
  flagsData=flags;
  const container=document.getElementById('flags-list');container.innerHTML='';
  const groups={};
  for(const [key,f] of Object.entries(flags)){
    const g=f.group||'Other';
    if(!groups[g])groups[g]=[];
    groups[g].push([key,f]);
  }
  for(const [group,items] of Object.entries(groups)){
    const g=document.createElement('div');g.className='flag-group';
    g.innerHTML=`<div class="flag-group-label">${group}</div>`;
    items.forEach(([key,f])=>{
      const row=document.createElement('div');row.className='flag-row';
      row.innerHTML=`<span class="flag-label">${f.label}</span>
        <label class="toggle">
          <input type="checkbox" data-key="${key}" ${f.enabled?'checked':''}>
          <span class="slider"></span>
        </label>`;
      g.appendChild(row);
    });
    container.appendChild(g);
  }
  // Bind toggles
  container.querySelectorAll('input[data-key]').forEach(el=>{
    el.addEventListener('change',async()=>{
      const key=el.dataset.key,enabled=el.checked;
      try{
        const r=await fetch(`/admin/api/flags/${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled})});
        const d=await r.json();
        if(!d.ok){el.checked=!enabled;alert('Flag update failed');}
        else{flagsData[key].enabled=enabled;appendLog(Date.now(),'admin',`Flag "${flagsData[key]?.label||key}" ${enabled?'ENABLED':'DISABLED'}`);}
      }catch(e){el.checked=!enabled;}
    });
  });
}

function updateFlagInUI(key,enabled){
  const el=document.querySelector(`input[data-key="${key}"]`);
  if(el)el.checked=enabled;
  if(flagsData[key])flagsData[key].enabled=enabled;
}

// ═══════════════════════════════════════════════════════
// USERS TABLE
// ═══════════════════════════════════════════════════════
function renderUsers(users){
  const tbody=document.getElementById('users-tbody');tbody.innerHTML='';
  users.forEach(u=>{
    const tr=document.createElement('tr');
    const created=u.created_at?new Date(u.created_at).toLocaleDateString():'—';
    tr.innerHTML=`<td class="email">${u.email||'—'}</td><td style="color:rgba(200,212,232,0.3);font-size:9px">${(u.id||'').slice(0,8)}…</td><td>${created}</td><td><span class="user-badge">ACTIVE</span></td>`;
    tbody.appendChild(tr);
  });
}
document.getElementById('user-search').addEventListener('input',function(){
  const q=this.value.toLowerCase();
  renderUsers(allUsers.filter(u=>(u.email||'').toLowerCase().includes(q)));
});

// ═══════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════
function updateStats(stats){
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v??'—';};
  set('st-users',stats.users);set('tb-users',stats.users);
  set('st-prayer',stats.prayerPlans);set('tb-prayer',stats.prayerPlans);
  set('st-devotion',stats.devotionPlans);set('tb-devotion',stats.devotionPlans);
  set('st-feedback',stats.feedbackCount);set('tb-feedback',stats.feedbackCount);
  set('st-keywords',stats.learnedKeywords);set('tb-keywords',stats.learnedKeywords);
}

// ═══════════════════════════════════════════════════════
// SSE — EVENT STREAM
// ═══════════════════════════════════════════════════════
const connDot=document.getElementById('conn-dot');
function connectSSE(){
  const es=new EventSource('/admin/api/events');
  connDot.style.background='#ffb800';
  es.onopen=()=>{connDot.style.background='#00ff9d';connDot.style.boxShadow='0 0 10px #00ff9d';};
  es.onmessage=ev=>{
    let d;try{d=JSON.parse(ev.data);}catch{return;}

    if(d.type==='state_snapshot'){
      // Initial state replay
      agentState=d.agents||{};
      if(d.flags)renderFlags(d.flags);
      renderAgents();
      appendLog(Date.now(),'scheduler','Dashboard connected — state snapshot received','#94a3b8');
      return;
    }
    if(d.type==='agent'){
      if(!agentState[d.agent])agentState[d.agent]={};
      agentState[d.agent].status=d.status;
      agentState[d.agent].detail=d.detail||'';
      if(d.status==='done'){agentState[d.agent].lastRun=d.ts;agentState[d.agent].duration=d.duration;}
      renderAgents();
      const emoji=d.status==='running'?'▶':'done'===d.status?'✓':'✗';
      appendLog(d.ts,d.agent,`${emoji} ${d.detail||d.status}`);
      return;
    }
    if(d.type==='log'){appendLog(d.ts,d.agent||'system',d.detail||'');return;}
    if(d.type==='flag_update'){updateFlagInUI(d.key,d.enabled);appendLog(d.ts,'admin',`Flag "${d.label||d.key}" set to ${d.enabled?'ON':'OFF'}`);return;}
  };
  es.onerror=()=>{
    connDot.style.background='#ff3d5a';connDot.style.boxShadow='0 0 10px #ff3d5a';
    setTimeout(connectSSE,3000);
  };
}
connectSSE();

// ═══════════════════════════════════════════════════════
// INITIAL DATA LOAD
// ═══════════════════════════════════════════════════════
async function loadStats(){
  try{const r=await fetch('/admin/api/stats');const d=await r.json();
    if(d.stats)updateStats(d.stats);
    if(d.agents){for(const[k,v]of Object.entries(d.agents)){agentState[k]=v;}renderAgents();}
  }catch(e){console.warn('stats load failed',e);}
}
async function loadUsers(){
  try{const r=await fetch('/admin/api/users');const d=await r.json();
    if(d.users){allUsers=d.users;renderUsers(d.users);}
  }catch(e){console.warn('users load failed',e);}
}
async function loadFlags(){
  try{const r=await fetch('/admin/api/flags');const d=await r.json();
    if(d.flags)renderFlags(d.flags);
  }catch(e){console.warn('flags load failed',e);}
}

loadStats();loadUsers();loadFlags();
// Refresh stats every 30s
setInterval(loadStats,30000);
renderAgents();

// Simulate some ambient activity for visual interest when agents are idle
setInterval(()=>{
  const keys=Object.keys(AGENT_META);
  const k=keys[Math.floor(Math.random()*keys.length)];
  if(!agentState[k]||agentState[k].status==='idle'){/* nothing, keep idle */}
  renderAgents();
},2000);
</script>
